<!--
  ===================================================================
  로그 백업용 티스토리 템플릿 (별자리 지도 / 천체도 스타일)
  ===================================================================
  제목도, 날짜도 없습니다. 로그 본문만 있습니다.

  사용법
    1) <div class="log-entry"> ... </div> 블록 하나가 로그 한 편입니다.
    2) 새 로그를 추가할 땐 이 블록 전체를 복사해서 맨 위에 붙여넣으세요.
    3) <script type="text/plain" class="raw-text"> 안에 원문을
       그대로 붙여넣으면 끝입니다.
         - 문단은 빈 줄이든 단순 줄바꿈이든 자동으로 인식됩니다.
         - 문단 속 "대사"는 금색으로, '생각'은 이탤릭으로 자동 강조됩니다.
    4) 티스토리 글쓰기 화면 → HTML 모드 → 이 코드 전체 붙여넣기.
  ===================================================================
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+KR:wght@400;500;600&display=swap');

  .log-archive {
    --void: #0B1526;
    --void-deep: #060A14;
    --gold: #C9A24A;
    --gold-dim: rgba(201, 162, 74, 0.35);
    --parchment: #E9E2CE;
    --parchment-dim: #9BA3B5;
    --think: #8C93B8;

    position: relative;
    max-width: 660px;
    margin: 0 auto;
    padding: 64px 30px 72px;
    background-color: var(--void);
    background-image:
      radial-gradient(rgba(233, 226, 206, 0.55) 0.8px, transparent 1.2px),
      radial-gradient(rgba(233, 226, 206, 0.34) 1px, transparent 1.4px),
      radial-gradient(rgba(233, 226, 206, 0.22) 1.3px, transparent 1.8px),
      radial-gradient(rgba(233, 226, 206, 0.15) 1.7px, transparent 2.2px),
      linear-gradient(160deg, var(--void) 0%, var(--void-deep) 100%);
    background-size:
      97px 131px,
      173px 149px,
      221px 197px,
      311px 269px,
      100% 100%;
    background-position:
      0 0,
      38px 71px,
      12px 140px,
      160px 20px,
      0 0;
    color: var(--parchment);
    font-family: 'EB Garamond', 'Noto Serif KR', serif;
    overflow: hidden;
    box-sizing: border-box;
  }
  .log-archive * { box-sizing: border-box; }

  /* 우측 상단의 장식용 천체도 그래픽 (신호용 시그니처 요소) */
  .log-archive .chart-mark {
    position: absolute;
    top: -70px;
    right: -70px;
    width: 300px;
    height: 300px;
    opacity: 0.22;
    pointer-events: none;
  }

  .log-entry {
    position: relative;
    z-index: 1;
    padding-top: 34px;
    margin-bottom: 50px;
  }
  .log-entry:last-of-type { margin-bottom: 0; }

  /* 제목/날짜 대신 들어가는 별 표식 구분선 */
  .log-entry .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 32px;
  }
  .log-entry .divider::before,
  .log-entry .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--gold-dim);
  }
  .log-entry .divider svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    opacity: 0.85;
  }

  .log-body p {
    margin: 0 0 1.15em;
    text-indent: 1em;
    font-size: 13px;
    line-height: 1.9;
    letter-spacing: 0.01em;
    color: var(--parchment);
  }
  .log-body p:last-child { margin-bottom: 0; }

  /* 대사 : "..." */
  .log-body .say {
    color: var(--gold);
    letter-spacing: 0.015em;
  }

  /* 생각 : '...' */
  .log-body .think {
    color: var(--think);
    font-style: italic;
  }

  .raw-text { display: none; }

  @media (max-width: 480px) {
    .log-archive { padding: 48px 18px 56px; }
    .log-archive .chart-mark { width: 200px; height: 200px; top: -40px; right: -40px; }
    .log-body p { font-size: 12.5px; }
  }
</style>

<div class="log-archive">

  <!-- 장식용 천체도 SVG (텍스트 없음) -->
  <svg class="chart-mark" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="#C9A24A" stroke-width="0.6">
      <circle cx="100" cy="100" r="20"/>
      <circle cx="100" cy="100" r="42"/>
      <circle cx="100" cy="100" r="64"/>
      <circle cx="100" cy="100" r="86"/>
      <line x1="100" y1="0" x2="100" y2="200"/>
      <line x1="0" y1="100" x2="200" y2="100"/>
      <line x1="29" y1="29" x2="171" y2="171"/>
      <line x1="171" y1="29" x2="29" y2="171"/>
    </g>
    <g fill="#C9A24A">
      <circle cx="100" cy="14" r="1.4"/>
      <circle cx="163" cy="52" r="1"/>
      <circle cx="182" cy="121" r="1.2"/>
      <circle cx="140" cy="178" r="1"/>
      <circle cx="60" cy="182" r="1.3"/>
      <circle cx="18" cy="130" r="1"/>
      <circle cx="34" cy="58" r="1.2"/>
    </g>
  </svg>

  <!-- ▼ 이 블록을 복사해서 새 로그를 추가하세요 (예시 1건) ▼ -->

  <div class="log-entry">
    <div class="divider">
      <svg viewBox="0 0 24 24" fill="none" stroke="#C9A24A" stroke-width="1">
        <path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z"/>
      </svg>
    </div>
    <div class="log-body"></div>
    <script type="text/plain" class="raw-text">
그는 창가에 기대어 오래도록 말이 없었다. 바람이 커튼을 흔들 때마다 방 안의 공기가 조금씩 차가워지는 것 같았다. "오늘따라 왜 이렇게 조용해." 그가 먼저 침묵을 깼다. 목소리는 낮았지만 어딘가 조심스러웠다.

그녀는 고개를 저으며 시선을 피했다. '말할까, 말까.' 몇 번이고 입을 열었다 닫기를 반복했다. 결국 그녀가 고른 대답은 진심과는 조금 먼 것이었다. "아무것도 아니야." 짧은 문장이었지만 그 안에 담긴 무게는 결코 가볍지 않았다.

창밖으로는 어느새 별이 하나둘 돋아나 있었다.
    </script>
  </div>

  <!-- ▲ 여기까지 예시 ▲ -->

</div>

<script>
(function () {
  function escapeHtml(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function highlightQuotes(text) {
    return text
      .replace(/(["“][^"”]*["”])/g, '<span class="say">$1</span>')
      .replace(/('[^']*'|‘[^’]*’)/g, '<span class="think">$1</span>');
  }

  function render(rawText) {
    var paragraphs = rawText
      .split(/\n\s*\n/)
      .map(function (block) { return block.trim(); })
      .filter(function (block) { return block.length > 0; });

    if (paragraphs.length <= 1) {
      paragraphs = rawText
        .split(/\n/)
        .map(function (l) { return l.trim(); })
        .filter(function (l) { return l.length > 0; });
    }

    return paragraphs
      .map(function (p) {
        return '<p>' + highlightQuotes(escapeHtml(p)) + '</p>';
      })
      .join('');
  }

  var entries = document.querySelectorAll('.log-entry');
  entries.forEach(function (entry) {
    var raw = entry.querySelector('.raw-text');
    var target = entry.querySelector('.log-body');
    if (raw && target) {
      target.innerHTML = render(raw.textContent);
    }
  });
})();
</script>
